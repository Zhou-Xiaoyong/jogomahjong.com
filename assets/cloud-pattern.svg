<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- 中国传统回纹（雷纹）无缝底纹 -->
  <g fill="none" stroke="#b91c1c" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter" opacity="0.12">

    <!-- 回纹单元1: 左上 -->
    <path d="M10 10 L40 10 L40 40 L20 40 L20 20 L30 20 L30 30 L25 30"/>
    <!-- 回纹单元2: 右上 -->
    <path d="M60 10 L90 10 L90 40 L70 40 L70 20 L80 20 L80 30 L75 30"/>
    <!-- 回纹单元3: 中上 -->
    <path d="M110 10 L140 10 L140 40 L120 40 L120 20 L130 20 L130 30 L125 30"/>
    <!-- 回纹单元4: 右上角 -->
    <path d="M160 10 L190 10 L190 40 L170 40 L170 20 L180 20 L180 30 L175 30"/>

    <!-- 回纹单元5: 左中 -->
    <path d="M10 60 L40 60 L40 90 L20 90 L20 70 L30 70 L30 80 L25 80"/>
    <!-- 回纹单元6: 中中 -->
    <path d="M60 60 L90 60 L90 90 L70 90 L70 70 L80 70 L80 80 L75 80"/>
    <!-- 回纹单元7: 中中2 -->
    <path d="M110 60 L140 60 L140 90 L120 90 L120 70 L130 70 L130 80 L125 80"/>
    <!-- 回纹单元8: 右中 -->
    <path d="M160 60 L190 60 L190 90 L170 90 L170 70 L180 70 L180 80 L175 80"/>

    <!-- 回纹单元9: 左下 -->
    <path d="M10 110 L40 110 L40 140 L20 140 L20 120 L30 120 L30 130 L25 130"/>
    <!-- 回纹单元10: 中下 -->
    <path d="M60 110 L90 110 L90 140 L70 140 L70 120 L80 120 L80 130 L75 130"/>
    <!-- 回纹单元11: 中下2 -->
    <path d="M110 110 L140 110 L140 140 L120 140 L120 120 L130 120 L130 130 L125 130"/>
    <!-- 回纹单元12: 右下 -->
    <path d="M160 110 L190 110 L190 140 L170 140 L170 120 L180 120 L180 130 L175 130"/>

    <!-- 回纹单元13: 左下角 -->
    <path d="M10 160 L40 160 L40 190 L20 190 L20 170 L30 170 L30 180 L25 180"/>
    <!-- 回纹单元14: 中下底 -->
    <path d="M60 160 L90 160 L90 190 L70 190 L70 170 L80 170 L80 180 L75 180"/>
    <!-- 回纹单元15: 中下底2 -->
    <path d="M110 160 L140 160 L140 190 L120 190 L120 170 L130 170 L130 180 L125 180"/>
    <!-- 回纹单元16: 右下角 -->
    <path d="M160 160 L190 160 L190 190 L170 190 L170 170 L180 170 L180 180 L175 180"/>

  </g>

  <!-- 金色装饰圆点 -->
  <g fill="#c9972a" opacity="0.10">
    <circle cx="50" cy="50" r="2"/>
    <circle cx="100" cy="50" r="2"/>
    <circle cx="150" cy="50" r="2"/>
    <circle cx="50" cy="100" r="2"/>
    <circle cx="100" cy="100" r="2"/>
    <circle cx="150" cy="100" r="2"/>
    <circle cx="50" cy="150" r="2"/>
    <circle cx="100" cy="150" r="2"/>
    <circle cx="150" cy="150" r="2"/>
  </g>
</svg>
